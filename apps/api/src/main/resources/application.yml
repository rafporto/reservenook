spring:
    application:
        name: reservenook-api
    datasource:
        url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/reservenook}
        username: ${DATABASE_USERNAME:reservenook}
        password: ${DATABASE_PASSWORD:reservenook}
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: validate
    flyway:
        enabled: true
        locations: classpath:db/migration
    mail:
        host: ${MAIL_HOST:localhost}
        port: ${MAIL_PORT:1025}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: ${MAIL_SMTP_AUTH:false}
                    starttls:
                        enable: ${MAIL_SMTP_STARTTLS:false}

management:
    endpoints:
        web:
            exposure:
                include: health,info

server:
    port: ${SERVER_PORT:8080}

app:
    registration:
        public-base-url: ${PUBLIC_APP_BASE_URL:http://localhost:3000}
        activation-token-hours: ${ACTIVATION_TOKEN_HOURS:48}
