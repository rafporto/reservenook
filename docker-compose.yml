services:
  postgres:
    image: postgres:16
    container_name: reservenook-postgres
    environment:
      POSTGRES_DB: reservenook
      POSTGRES_USER: reservenook
      POSTGRES_PASSWORD: reservenook
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: reservenook-redis
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    container_name: reservenook-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:

